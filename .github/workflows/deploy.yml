name: Deploy Website

# Скрипт запускается автоматически при каждом push в ветку main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем код из репозитория (опционально, если нужно что-то собирать прямо в CI)
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Подключаемся к серверу по SSH и выполняем команды обновления
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Переходим в папку с проектом на сервере (замените путь на свой)
            cd /mnwok.github.io
            
            # 2. Стягиваем последние изменения из репозитория
            git pull origin main
            
            # 3. Пересобираем и перезапускаем докер-контейнеры
            # Флаг --build заставит Docker пересобрать образ, если изменился Dockerfile или код
            # Флаг -d запустит контейнеры в фоновом режиме
            docker compose up -d --build
            
            # 4. Опционально: очищаем старые неиспользуемые образы, чтобы не забивать диск
            docker image prune -f